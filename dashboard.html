<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Quản lý tiếp nhận đơn | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #eef2f9;
            min-height: 100vh;
            padding: 16px;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header-bar {
            background: linear-gradient(135deg, #1e2b3c 0%, #0f212f 100%);
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }

        .title-section h1 {
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .title-section h1 i {
            background: #ff9800;
            padding: 5px;
            border-radius: 50%;
            font-size: 0.9rem;
            color: #1e2b3c;
        }

        .date-location {
            color: #cbd5e1;
            font-size: 0.7rem;
            margin-top: 4px;
        }

        .right-header {
            text-align: right;
        }

        .datetime-large {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            font-family: monospace;
        }

        .date-text {
            color: #a0c4e2;
            font-size: 0.7rem;
        }

        .user-info-tag {
            background: #2d4a6e40;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.65rem;
            color: #e2e8f0;
            display: inline-block;
            margin-top: 4px;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 20px;
            background: #ffffff;
            border-bottom: 1px solid #e9edf2;
        }

        .btn-action {
            background: #f0f4fa;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
            color: #1f2a44;
        }

        .btn-action i {
            font-size: 0.8rem;
        }

        .btn-action:nth-child(1) { background: #2c7da0; color: white; }
        .btn-action:nth-child(2) { background: #dc2626; color: white; }
        .btn-action:nth-child(3) { background: #f59e0b; color: white; }
        .btn-action:nth-child(4) { background: #10b981; color: white; }
        
        .btn-action:hover { transform: translateY(-1px); opacity: 0.9; }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .filter-group label {
            font-size: 0.6rem;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
        }

        .filter-group select, .filter-group input {
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            font-family: inherit;
            font-size: 0.7rem;
            background: white;
            min-width: 100px;
        }

        .btn-filter, .btn-export {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-export { background: #10b981; }
        .btn-filter:hover { background: #1f6390; }
        .btn-export:hover { background: #059669; }

        .stats-summary {
            display: flex;
            gap: 10px;
            padding: 8px 20px;
            flex-wrap: wrap;
            background: #ffffff;
        }

        .stat-card {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 6px 14px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 1.1rem;
            font-weight: 700;
            color: #2c7da0;
        }

        .stat-card .label {
            font-size: 0.6rem;
            color: #64748b;
        }

        .orders-section {
            padding: 12px 20px 20px 20px;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #0f172a;
            border-left: 3px solid #ff9800;
            padding-left: 10px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #eef2f6;
            background: #fff;
        }

        .order-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
        }

        .order-table th {
            background: #f8fafc;
            padding: 8px 8px;
            text-align: left;
            font-weight: 600;
            color: #1e293b;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.7rem;
        }

        .order-table td {
            padding: 8px 8px;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }

        .order-table tr:hover {
            background: #fefce8;
        }

        .badge-status {
            background: #e6f7e6;
            color: #2e7d32;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 600;
            display: inline-block;
        }

        /* Trạng thái badge cho bảng */
        .badge-status-processing { background: #fef3c7; color: #b45309; }
        .badge-status-thuly { background: #dbeafe; color: #1e40af; }
        .badge-status-tradon { background: #fee2e2; color: #b91c1c; }
        .badge-status-chuyendon { background: #e0e7ff; color: #3730a3; }

        .empty-row td {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
            font-size: 0.75rem;
        }

        .action-icons button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            padding: 4px 6px;
            border-radius: 16px;
            transition: 0.2s;
            margin: 0 2px;
        }

        .btn-view { background: #e0f2fe; color: #0369a1; }
        .btn-edit { background: #fef9c3; color: #b45309; }
        .btn-delete-order { background: #fee2e2; color: #dc2626; }

        .btn-view:hover, .btn-edit:hover, .btn-delete-order:hover { transform: scale(1.02); opacity: 0.85; }

        /* Modal styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.25s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-card {
            background: white;
            max-width: 800px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 28px;
            padding: 0;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.35);
            animation: modalSlideIn 0.2s ease;
        }

        @keyframes modalSlideIn {
            from { transform: scale(0.96); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-header {
            background: linear-gradient(135deg, #1e2b3c 0%, #0f212f 100%);
            padding: 18px 24px;
            border-radius: 28px 28px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-header h3 i {
            background: #ff9800;
            padding: 6px;
            border-radius: 50%;
            font-size: 0.85rem;
            color: #1e2b3c;
        }

        .modal-close-icon {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }

        .modal-close-icon:hover {
            background: #dc2626;
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 20px 24px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px 20px;
        }

        .detail-item {
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px 14px;
            transition: 0.1s;
            border-left: 3px solid #ff9800;
        }

        .detail-item-full {
            grid-column: span 2;
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px 14px;
            border-left: 3px solid #ff9800;
        }

        .detail-label {
            font-size: 0.65rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .detail-label i {
            width: 20px;
            color: #ff9800;
            font-size: 0.7rem;
        }

        .detail-value {
            font-size: 0.85rem;
            font-weight: 500;
            color: #0f172a;
            word-break: break-word;
            line-height: 1.4;
        }

        .status-badge-detail {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .status-processing { background: #fef3c7; color: #b45309; }
        .status-thuly { background: #dbeafe; color: #1e40af; }
        .status-tradon { background: #fee2e2; color: #b91c1c; }
        .status-chuyendon { background: #e0e7ff; color: #3730a3; }

        .modal-actions {
            display: flex;
            gap: 12px;
            padding: 16px 24px 24px;
            justify-content: flex-end;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
        }

        .modal-actions button {
            padding: 8px 22px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-cancel {
            background: #f1f5f9;
            color: #334155;
        }

        .btn-cancel:hover {
            background: #e2e8f0;
        }

        .edit-form-row {
            margin-bottom: 14px;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 5px;
        }

        .edit-form-row label {
            width: 130px;
            font-weight: 600;
            font-size: 0.7rem;
            color: #334155;
            padding-top: 6px;
        }

        .edit-form-row input, .edit-form-row select, .edit-form-row textarea {
            flex: 1;
            padding: 6px 10px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-family: inherit;
            font-size: 0.7rem;
            background: #fff;
        }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.7rem;
            z-index: 1100;
            display: none;
        }

        @media (max-width: 680px) {
            body { padding: 8px; }
            .filter-group select, .filter-group input { min-width: 80px; }
            .btn-action { padding: 4px 10px; font-size: 0.7rem; }
            .order-table th, .order-table td { padding: 6px 5px; }
            .detail-grid { grid-template-columns: 1fr; gap: 12px; }
            .detail-item-full { grid-column: span 1; }
            .modal-body { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header-bar">
        <div class="title-section">
            <h1><i class="fas fa-clipboard-list"></i> QUẢN LÝ TIẾP NHẬN ĐƠN</h1>
            <div class="date-location">
                <i class="fas fa-map-marker-alt"></i> Ninh Kiều, <span id="current-location-date"></span>
            </div>
            <div class="user-info-tag" id="user-email-display">
                <i class="fas fa-user-circle"></i> <span>Đang tải...</span>
            </div>
        </div>
        <div class="right-header">
            <div class="datetime-large" id="live-clock">--:--</div>
            <div class="date-text" id="full-date-text"></div>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn-action" onclick="window.location.href='tiepnhandon.html'"><i class="fas fa-plus-circle"></i> TIẾP NHẬN</button>
        <button class="btn-action" id="logout-btn-nav"><i class="fas fa-sign-out-alt"></i> THOÁT</button>
        <button class="btn-action" id="refresh-btn"><i class="fas fa-sync-alt"></i> LÀM MỚI</button>
        <button class="btn-action" id="export-all-btn"><i class="fas fa-file-excel"></i> XUẤT ALL</button>
    </div>

    <div class="filter-bar">
        <div class="filter-group">
            <label>Tháng</label>
            <select id="filter-month">
                <option value="">Tất cả</option>
                <option value="1">T1</option><option value="2">T2</option><option value="3">T3</option>
                <option value="4">T4</option><option value="5">T5</option><option value="6">T6</option>
                <option value="7">T7</option><option value="8">T8</option><option value="9">T9</option>
                <option value="10">T10</option><option value="11">T11</option><option value="12">T12</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Năm</label>
            <select id="filter-year"><option value="">Tất cả</option></select>
        </div>
        <div class="filter-group">
            <label>Loại đơn</label>
            <select id="filter-loai"><option value="">Tất cả</option></select>
        </div>
        <div class="filter-group">
            <label>Tìm kiếm</label>
            <input type="text" id="search-input" placeholder="Tên hoặc nội dung...">
        </div>
        <button class="btn-filter" id="apply-filter"><i class="fas fa-filter"></i> LỌC</button>
        <button class="btn-export" id="export-filter-btn"><i class="fas fa-download"></i> XUẤT LỌC</button>
    </div>

    <div class="stats-summary" id="stats-summary"></div>

    <div class="orders-section">
        <div class="section-title"><i class="fas fa-receipt"></i> Danh sách đơn đã tiếp nhận</div>
        <div class="table-wrapper">
            <table class="order-table">
                <thead>
                    <tr><th>Mã</th><th>Người khiếu nại</th><th>Phân loại</th>
                        <th>Nội dung</th><th>Ngày nhận</th><th>Trạng thái</th><th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="order-table-body">
                    <tr class="empty-row"><td colspan="7">📭 Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal chi tiết -->
<div id="detailModal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header">
            <h3><i class="fas fa-file-alt"></i> CHI TIẾT ĐƠN</h3>
            <button class="modal-close-icon" id="closeDetailHeaderBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body" id="detail-content"></div>
        <div class="modal-actions">
            <button class="btn-cancel" id="closeDetailBtn">Đóng</button>
        </div>
    </div>
</div>

<!-- Modal chỉnh sửa -->
<div id="editModal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header">
            <h3><i class="fas fa-pen-alt"></i> CHỈNH SỬA ĐƠN</h3>
            <button class="modal-close-icon" id="closeEditHeaderBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <form id="editForm">
                <input type="hidden" id="edit-order-id">
                <div class="edit-form-row"><label>Ngày nhận:</label><input type="text" id="edit-ngayNhanDon" placeholder="DD/MM/YYYY"></div>
                <div class="edit-form-row"><label>Họ tên:</label><input type="text" id="edit-hoTen"></div>
                <div class="edit-form-row"><label>CCCD:</label><input type="text" id="edit-cccd"></div>
                <div class="edit-form-row"><label>Địa chỉ:</label><input type="text" id="edit-diaChi"></div>
                <div class="edit-form-row"><label>Phân loại:</label><select id="edit-phanLoai"></select></div>
                <div class="edit-form-row"><label>Nội dung:</label><textarea id="edit-noiDung" rows="3"></textarea></div>
                <div class="edit-form-row"><label>Cơ quan:</label><input type="text" id="edit-coQuan"></div>
                <div class="edit-form-row"><label>Trả lời:</label><input type="text" id="edit-traLoi" placeholder="Nội dung trả lời"></div>
                <div class="edit-form-row"><label>Thụ lý:</label><select id="edit-thuLy"><option value="false">Không</option><option value="true">Có</option></select><input type="text" id="edit-thuLyText" placeholder="Ghi chú thụ lý" style="flex:1.5;"></div>
                <div class="edit-form-row"><label>Trả đơn:</label><select id="edit-traDon"><option value="false">Không</option><option value="true">Có</option></select><input type="text" id="edit-traDonText" placeholder="Lý do trả đơn" style="flex:1.5;"></div>
                <div class="edit-form-row"><label>Chuyển đơn:</label><select id="edit-chuyenDon"><option value="false">Không</option><option value="true">Có</option></select><input type="text" id="edit-chuyenDonText" placeholder="Chuyển đến đơn vị" style="flex:1.5;"></div>
                <div class="edit-form-row"><label>Ghi chú:</label><textarea id="edit-ghiChu" rows="2"></textarea></div>
                <div class="modal-actions" style="padding: 16px 0 0 0;"><button type="button" class="btn-cancel" id="closeEditBtn">Hủy</button><button type="submit" class="btn-save" style="background:#10b981; color:white"><i class="fas fa-save"></i> Lưu cập nhật</button></div>
            </form>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, onValue, remove, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDTOD66P7I9d9Nc-SeRySoCskl5EEquR-w",
        authDomain: "chamcong-9385e.firebaseapp.com",
        databaseURL: "https://chamcong-9385e-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "chamcong-9385e",
        storageBucket: "chamcong-9385e.firebasestorage.app",
        messagingSenderId: "416187735141",
        appId: "1:416187735141:web:e0a6010118ae5ce5b47a8c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    let allOrders = [];
    let loaiDonList = [];

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.style.backgroundColor = isError ? '#dc2626' : '#2c7da0';
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // Hàm xác định trạng thái đơn hàng theo thứ tự ưu tiên: Chuyển đơn > Trả đơn > Đã thụ lý > Đang xử lý
    function getTrangThai(order) {
        if (order.chuyenDon === true) return { text: 'Chuyển đơn', class: 'badge-status-chuyendon' };
        if (order.traDon === true) return { text: 'Trả đơn', class: 'badge-status-tradon' };
        if (order.thuLy === true) return { text: 'Đã thụ lý', class: 'badge-status-thuly' };
        return { text: 'Đang xử lý', class: 'badge-status-processing' };
    }

    async function loadLoaiDon() {
        if (!currentUser) return;
        const snapshot = await get(ref(db, `loaidon/${currentUser.uid}`));
        loaiDonList = snapshot.exists() ? snapshot.val() : ["Khiếu nại", "Tố cáo", "Kiến nghị", "Phản ảnh", "Tranh chấp"];
        const filterSelect = document.getElementById('filter-loai');
        filterSelect.innerHTML = '<option value="">Tất cả</option>';
        loaiDonList.forEach(loai => { const opt = document.createElement('option'); opt.value = loai; opt.textContent = loai; filterSelect.appendChild(opt); });
        const editSelect = document.getElementById('edit-phanLoai');
        editSelect.innerHTML = '';
        loaiDonList.forEach(loai => { const opt = document.createElement('option'); opt.value = loai; opt.textContent = loai; editSelect.appendChild(opt); });
    }

    function loadOrders() {
        if (!currentUser) return;
        onValue(ref(db, `tiepnhandon/${currentUser.uid}`), (snapshot) => {
            const data = snapshot.val();
            allOrders = data ? Object.entries(data).map(([id, value]) => ({ id, ...value })).sort((a, b) => parseInt(b.id) - parseInt(a.id)) : [];
            applyFilterAndRender();
        });
    }

    function getMonthFromDate(dateStr) { if (!dateStr) return null; if (dateStr.includes('/')) return parseInt(dateStr.split('/')[1]); if (dateStr.includes('-')) return parseInt(dateStr.split('-')[1]); return null; }
    function getYearFromDate(dateStr) { if (!dateStr) return null; if (dateStr.includes('/')) return parseInt(dateStr.split('/')[2]); if (dateStr.includes('-')) return parseInt(dateStr.split('-')[0]); return null; }

    function applyFilterAndRender() {
        const month = document.getElementById('filter-month').value;
        const year = document.getElementById('filter-year').value;
        const loai = document.getElementById('filter-loai').value;
        const searchText = document.getElementById('search-input').value.toLowerCase().trim();
        let filtered = [...allOrders];
        if (month) filtered = filtered.filter(o => getMonthFromDate(o.ngayNhanDon) === parseInt(month));
        if (year) filtered = filtered.filter(o => getYearFromDate(o.ngayNhanDon) === parseInt(year));
        if (loai) filtered = filtered.filter(o => o.phanLoai === loai);
        if (searchText) filtered = filtered.filter(o => (o.hoTen && o.hoTen.toLowerCase().includes(searchText)) || (o.noiDung && o.noiDung.toLowerCase().includes(searchText)));
        renderOrders(filtered);
        updateStats(filtered);
    }

    function updateStats(orders) {
        const statsDiv = document.getElementById('stats-summary');
        const byLoai = {};
        orders.forEach(o => { const l = o.phanLoai || 'Khác'; byLoai[l] = (byLoai[l] || 0) + 1; });
        let html = `<div class="stat-card"><div class="number">${orders.length}</div><div class="label">Tổng</div></div>`;
        Object.entries(byLoai).slice(0, 4).forEach(([l, c]) => { html += `<div class="stat-card"><div class="number">${c}</div><div class="label">${l.length > 12 ? l.slice(0,10)+'…' : l}</div></div>`; });
        statsDiv.innerHTML = html;
    }

    function renderOrders(orders) {
        const tbody = document.getElementById('order-table-body');
        if (orders.length === 0) { tbody.innerHTML = '<tr class="empty-row"><td colspan="7">📭 Không có đơn nào</td></tr>'; return; }
        let html = '';
        orders.forEach(order => {
            const trangThai = getTrangThai(order);
            html += `<tr>
                <td><strong>#${order.id}</strong></td>
                <td>${escapeHtml(order.hoTen || '—')}</td>
                <td><span class="badge-status">${escapeHtml(order.phanLoai || '—')}</span></td>
                <td>${escapeHtml((order.noiDung || '').substring(0, 40))}${(order.noiDung || '').length > 40 ? '…' : ''}</td>
                <td>${order.ngayNhanDon || '—'}</td>
                <td><span class="${trangThai.class} badge-status" style="display:inline-block;">${trangThai.text}</span></td>
                <td class="action-icons">
                    <button class="btn-view" data-id="${order.id}"><i class="fas fa-eye"></i></button>
                    <button class="btn-edit" data-id="${order.id}"><i class="fas fa-edit"></i></button>
                    <button class="btn-delete-order" data-id="${order.id}"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        });
        tbody.innerHTML = html;
        document.querySelectorAll('.btn-view').forEach(btn => { btn.addEventListener('click', () => { const order = allOrders.find(o => o.id === btn.getAttribute('data-id')); if (order) showDetail(order); }); });
        document.querySelectorAll('.btn-edit').forEach(btn => { btn.addEventListener('click', () => { const order = allOrders.find(o => o.id === btn.getAttribute('data-id')); if (order) openEditModal(order); }); });
        document.querySelectorAll('.btn-delete-order').forEach(btn => { btn.addEventListener('click', async () => { const id = btn.getAttribute('data-id'); if (confirm(`Xóa đơn #${id}?`)) { await remove(ref(db, `tiepnhandon/${currentUser.uid}/${id}`)); showToast(`Đã xóa #${id}`); } }); });
    }

    // Chi tiết đơn với trạng thái chính xác
    function showDetail(order) {
        const trangThai = getTrangThai(order);
        let statusClassForDetail = '';
        if (trangThai.text === 'Chuyển đơn') statusClassForDetail = 'status-chuyendon';
        else if (trangThai.text === 'Trả đơn') statusClassForDetail = 'status-tradon';
        else if (trangThai.text === 'Đã thụ lý') statusClassForDetail = 'status-thuly';
        else statusClassForDetail = 'status-processing';
        
        const detailHtml = `
            <div class="detail-grid">
                <div class="detail-item"><div class="detail-label"><i class="fas fa-hashtag"></i> Mã đơn</div><div class="detail-value"><strong>#${order.id}</strong></div></div>
                <div class="detail-item"><div class="detail-label"><i class="far fa-calendar-alt"></i> Ngày nhận</div><div class="detail-value">${order.ngayNhanDon || '—'}</div></div>
                <div class="detail-item"><div class="detail-label"><i class="fas fa-user"></i> Họ tên</div><div class="detail-value">${escapeHtml(order.hoTen || '—')}</div></div>
                <div class="detail-item"><div class="detail-label"><i class="fas fa-id-card"></i> CCCD</div><div class="detail-value">${order.cccd || '—'}</div></div>
                <div class="detail-item"><div class="detail-label"><i class="fas fa-map-marker-alt"></i> Địa chỉ</div><div class="detail-value">${escapeHtml(order.diaChi || '—')}</div></div>
                <div class="detail-item"><div class="detail-label"><i class="fas fa-tag"></i> Phân loại</div><div class="detail-value"><span class="badge-status">${escapeHtml(order.phanLoai || '—')}</span></div></div>
                <div class="detail-item-full"><div class="detail-label"><i class="fas fa-file-alt"></i> Nội dung</div><div class="detail-value">${escapeHtml(order.noiDung || '—')}</div></div>
                <div class="detail-item"><div class="detail-label"><i class="fas fa-building"></i> Cơ quan</div><div class="detail-value">${order.coQuan || '—'}</div></div>
                <div class="detail-item"><div class="detail-label"><i class="fas fa-info-circle"></i> Trạng thái</div><div class="detail-value"><span class="status-badge-detail ${statusClassForDetail}">${trangThai.text}</span></div></div>
                <div class="detail-item"><div class="detail-label"><i class="fas fa-reply"></i> Trả lời</div><div class="detail-value">${order.traLoi ? (order.traLoi + (order.traLoiText ? ': ' + order.traLoiText : '')) : '—'}</div></div>
                <div class="detail-item"><div class="detail-label"><i class="fas fa-gavel"></i> Thụ lý</div><div class="detail-value">${order.thuLy ? 'Có' : 'Không'} ${order.thuLyText ? '<span style="color:#64748b; font-size:0.7rem;">(' + escapeHtml(order.thuLyText) + ')</span>' : ''}</div></div>
                <div class="detail-item"><div class="detail-label"><i class="fas fa-undo-alt"></i> Trả đơn</div><div class="detail-value">${order.traDon ? 'Có' : 'Không'} ${order.traDonText ? '<span style="color:#64748b; font-size:0.7rem;">(' + escapeHtml(order.traDonText) + ')</span>' : ''}</div></div>
                <div class="detail-item"><div class="detail-label"><i class="fas fa-share"></i> Chuyển đơn</div><div class="detail-value">${order.chuyenDon ? 'Có' : 'Không'} ${order.chuyenDonText ? '<span style="color:#64748b; font-size:0.7rem;">(' + escapeHtml(order.chuyenDonText) + ')</span>' : ''}</div></div>
                <div class="detail-item-full"><div class="detail-label"><i class="fas fa-sticky-note"></i> Ghi chú</div><div class="detail-value">${escapeHtml(order.ghiChu || '—')}</div></div>
            </div>
        `;
        document.getElementById('detail-content').innerHTML = detailHtml;
        document.getElementById('detailModal').classList.add('active');
    }

    function openEditModal(order) {
        document.getElementById('edit-order-id').value = order.id;
        document.getElementById('edit-ngayNhanDon').value = order.ngayNhanDon || '';
        document.getElementById('edit-hoTen').value = order.hoTen || '';
        document.getElementById('edit-cccd').value = order.cccd || '';
        document.getElementById('edit-diaChi').value = order.diaChi || '';
        document.getElementById('edit-phanLoai').value = order.phanLoai || '';
        document.getElementById('edit-noiDung').value = order.noiDung || '';
        document.getElementById('edit-coQuan').value = order.coQuan || '';
        document.getElementById('edit-traLoi').value = order.traLoi || '';
        document.getElementById('edit-thuLy').value = order.thuLy === true ? 'true' : 'false';
        document.getElementById('edit-thuLyText').value = order.thuLyText || '';
        document.getElementById('edit-traDon').value = order.traDon === true ? 'true' : 'false';
        document.getElementById('edit-traDonText').value = order.traDonText || '';
        document.getElementById('edit-chuyenDon').value = order.chuyenDon === true ? 'true' : 'false';
        document.getElementById('edit-chuyenDonText').value = order.chuyenDonText || '';
        document.getElementById('edit-ghiChu').value = order.ghiChu || '';
        document.getElementById('editModal').classList.add('active');
    }

    async function saveEditedOrder(event) {
        event.preventDefault();
        const orderId = document.getElementById('edit-order-id').value;
        if (!orderId || !currentUser) return;
        const updatedData = {
            ngayNhanDon: document.getElementById('edit-ngayNhanDon').value,
            hoTen: document.getElementById('edit-hoTen').value,
            cccd: document.getElementById('edit-cccd').value,
            diaChi: document.getElementById('edit-diaChi').value,
            phanLoai: document.getElementById('edit-phanLoai').value,
            noiDung: document.getElementById('edit-noiDung').value,
            coQuan: document.getElementById('edit-coQuan').value,
            traLoi: document.getElementById('edit-traLoi').value,
            thuLy: document.getElementById('edit-thuLy').value === 'true',
            thuLyText: document.getElementById('edit-thuLyText').value,
            traDon: document.getElementById('edit-traDon').value === 'true',
            traDonText: document.getElementById('edit-traDonText').value,
            chuyenDon: document.getElementById('edit-chuyenDon').value === 'true',
            chuyenDonText: document.getElementById('edit-chuyenDonText').value,
            ghiChu: document.getElementById('edit-ghiChu').value
        };
        try {
            await update(ref(db, `tiepnhandon/${currentUser.uid}/${orderId}`), updatedData);
            showToast(`Đã cập nhật đơn #${orderId}`);
            document.getElementById('editModal').classList.remove('active');
        } catch (error) { showToast('Lỗi cập nhật!', true); }
    }

    function exportToExcel(orders, filename) {
        const data = orders.map(o => ({ 'Mã đơn': o.id, 'Ngày nhận': o.ngayNhanDon || '', 'Họ tên': o.hoTen || '', 'CCCD': o.cccd || '', 'Địa chỉ': o.diaChi || '', 'Phân loại': o.phanLoai || '', 'Nội dung': o.noiDung || '', 'Cơ quan': o.coQuan || '', 'Trả lời': o.traLoi || '', 'Thụ lý': o.thuLy ? 'Có' : 'Không', 'Trả đơn': o.traDon ? 'Có' : 'Không', 'Chuyển đơn': o.chuyenDon ? 'Có' : 'Không', 'Ghi chú': o.ghiChu || '' }));
        const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Danh sách đơn'); XLSX.writeFile(wb, filename); showToast(`Xuất ${orders.length} đơn`);
    }

    async function handleLogout() { await signOut(auth); window.location.href = "index.html"; }
    function populateYears() { const yearSelect = document.getElementById('filter-year'); const currentYear = new Date().getFullYear(); for (let y = 2020; y <= currentYear + 1; y++) { const option = document.createElement('option'); option.value = y; option.textContent = y; yearSelect.appendChild(option); } }
    function updateClockAndDate() { const now = new Date(); document.getElementById('live-clock').innerText = now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }); const fullDate = now.toLocaleDateString('vi-VN', { year: 'numeric', month: 'long', day: 'numeric' }); document.getElementById('full-date-text').innerHTML = now.toLocaleDateString('vi-VN', { weekday: 'short' }) + ', ' + fullDate; document.getElementById('current-location-date').innerHTML = fullDate; }

    onAuthStateChanged(auth, async (user) => { if (user) { currentUser = user; document.querySelector('#user-email-display span').innerText = user.email; populateYears(); await loadLoaiDon(); loadOrders(); } else { window.location.href = "index.html"; } });
    updateClockAndDate(); setInterval(updateClockAndDate, 60000);
    document.getElementById('logout-btn-nav').addEventListener('click', handleLogout);
    document.getElementById('refresh-btn').addEventListener('click', () => { loadOrders(); showToast('Đã làm mới'); });
    document.getElementById('apply-filter').addEventListener('click', applyFilterAndRender);
    document.getElementById('export-all-btn').addEventListener('click', () => { if (allOrders.length) exportToExcel(allOrders, `tat_ca_don_${new Date().toISOString().slice(0,10)}.xlsx`); else showToast('Không có dữ liệu', true); });
    document.getElementById('export-filter-btn').addEventListener('click', () => { const month = document.getElementById('filter-month').value; const year = document.getElementById('filter-year').value; const loai = document.getElementById('filter-loai').value; let filtered = [...allOrders]; if (month) filtered = filtered.filter(o => getMonthFromDate(o.ngayNhanDon) === parseInt(month)); if (year) filtered = filtered.filter(o => getYearFromDate(o.ngayNhanDon) === parseInt(year)); if (loai) filtered = filtered.filter(o => o.phanLoai === loai); if (filtered.length) exportToExcel(filtered, `ket_qua_loc_${new Date().toISOString().slice(0,10)}.xlsx`); else showToast('Không có dữ liệu để xuất', true); });
    const closeDetail = () => document.getElementById('detailModal').classList.remove('active');
    const closeEdit = () => document.getElementById('editModal').classList.remove('active');
    document.getElementById('closeDetailBtn').addEventListener('click', closeDetail);
    document.getElementById('closeDetailHeaderBtn').addEventListener('click', closeDetail);
    document.getElementById('closeEditBtn').addEventListener('click', closeEdit);
    document.getElementById('closeEditHeaderBtn').addEventListener('click', closeEdit);
    document.getElementById('editForm').addEventListener('submit', saveEditedOrder);
    document.getElementById('search-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') applyFilterAndRender(); });
    window.addEventListener('click', (e) => { if (e.target === document.getElementById('detailModal')) closeDetail(); if (e.target === document.getElementById('editModal')) closeEdit(); });
</script>
</body>
</html>
