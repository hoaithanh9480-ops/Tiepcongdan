<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Quản lý tiếp nhận đơn | Dashboard</title>
    <!-- Font Awesome 6 (Free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #eef2f9;
            min-height: 100vh;
            padding: 24px 20px;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header-bar {
            background: linear-gradient(135deg, #1e2b3c 0%, #0f212f 100%);
            padding: 20px 28px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d4a6e;
        }

        .title-section h1 {
            color: white;
            font-size: 1.7rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-section h1 i {
            background: #ff9800;
            padding: 8px;
            border-radius: 50%;
            font-size: 1.2rem;
            color: #1e2b3c;
        }

        .date-location {
            color: #cbd5e1;
            margin-top: 8px;
            font-size: 0.85rem;
        }

        .right-header {
            text-align: right;
        }

        .datetime-large {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            font-family: monospace;
        }

        .date-text {
            color: #a0c4e2;
            font-size: 0.9rem;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            padding: 28px 28px 20px 28px;
            background: #ffffff;
            border-bottom: 1px solid #e9edf2;
        }

        .btn-action {
            flex: 1;
            min-width: 180px;
            background: #f0f4fa;
            border: none;
            padding: 16px 12px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #1f2a44;
        }

        .btn-action i {
            font-size: 1.4rem;
        }

        .btn-action:first-child {
            background: #2c7da0;
            color: white;
        }

        .btn-action:first-child:hover {
            background: #1f6390;
            transform: translateY(-2px);
        }

        .btn-action:nth-child(2) {
            background: #dc2626;
            color: white;
        }

        .btn-action:nth-child(2):hover {
            background: #b91c1c;
        }

        .btn-action:nth-child(3) {
            background: #f59e0b;
            color: white;
        }

        .btn-action:nth-child(3):hover {
            background: #d97706;
        }

        .orders-section {
            padding: 20px 28px 32px 28px;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #0f172a;
            border-left: 5px solid #ff9800;
            padding-left: 16px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #eef2f6;
            background: #fff;
        }

        .order-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .order-table th {
            background: #f8fafc;
            padding: 16px 12px;
            text-align: left;
            font-weight: 600;
            color: #1e293b;
            border-bottom: 1px solid #e2e8f0;
        }

        .order-table td {
            padding: 14px 12px;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }

        .order-table tr:hover {
            background: #fefce8;
        }

        .badge-status {
            background: #e6f7e6;
            color: #2e7d32;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .empty-row td {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        .action-icons {
            display: flex;
            gap: 8px;
        }

        .action-icons button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 6px 10px;
            border-radius: 20px;
            transition: 0.2s;
        }

        .btn-view {
            background: #e0f2fe;
            color: #0369a1;
        }

        .btn-view:hover {
            background: #bae6fd;
        }

        .btn-delete-order {
            background: #fee2e2;
            color: #dc2626;
        }

        .btn-delete-order:hover {
            background: #fecaca;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-card {
            background: white;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 36px;
            padding: 28px 26px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            transform: scale(0.95);
            transition: transform 0.2s;
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        .modal-card h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #0f172a;
        }

        .detail-row {
            margin-bottom: 16px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
        }

        .detail-label {
            font-weight: 700;
            color: #475569;
            min-width: 120px;
            display: inline-block;
        }

        .detail-value {
            color: #1e293b;
            word-break: break-word;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-cancel {
            background: #e2e8f0;
            color: #1e293b;
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.85rem;
            z-index: 1100;
            display: none;
        }

        .user-info-tag {
            background: #2d4a6e40;
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 0.7rem;
            color: #e2e8f0;
            display: inline-block;
            margin-top: 6px;
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar select, .filter-bar input {
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid #cbd5e1;
            font-family: inherit;
        }

        .filter-bar input {
            flex: 1;
            min-width: 200px;
        }

        @media (max-width: 780px) {
            .header-bar {
                flex-direction: column;
                text-align: center;
                gap: 12px;
            }
            .right-header {
                text-align: center;
            }
            .datetime-large {
                font-size: 1.5rem;
            }
            .btn-action {
                font-size: 0.9rem;
                padding: 12px 8px;
            }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header-bar">
        <div class="title-section">
            <h1><i class="fas fa-clipboard-list"></i> QUẢN LÝ TIẾP NHẬN ĐƠN</h1>
            <div class="date-location">
                <i class="fas fa-map-marker-alt"></i> Ninh Kiều, 
                <span id="current-location-date"></span>
            </div>
            <div class="user-info-tag" id="user-email-display">
                <i class="fas fa-user-circle"></i> <span>Đang tải...</span>
            </div>
        </div>
        <div class="right-header">
            <div class="datetime-large" id="live-clock">--:--</div>
            <div class="date-text" id="full-date-text"></div>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn-action" onclick="window.location.href='tiepnhandon.html'">
            <i class="fas fa-plus-circle"></i> TIẾP NHẬN ĐƠN
        </button>
        <button class="btn-action" id="logout-btn-nav">
            <i class="fas fa-sign-out-alt"></i> THOÁT
        </button>
        <button class="btn-action" id="refresh-btn">
            <i class="fas fa-sync-alt"></i> LÀM MỚI
        </button>
    </div>

    <div class="orders-section">
        <div class="section-title">
            <i class="fas fa-receipt"></i> Danh sách đơn đã tiếp nhận
        </div>
        
        <div class="filter-bar">
            <select id="filter-loai">
                <option value="">Tất cả loại đơn</option>
            </select>
            <input type="text" id="search-input" placeholder="🔍 Tìm kiếm theo tên hoặc nội dung...">
        </div>
        
        <div class="table-wrapper">
            <table class="order-table" id="order-table">
                <thead>
                    <tr>
                        <th>Mã đơn</th>
                        <th>Người khiếu nại</th>
                        <th>Phân loại</th>
                        <th>Nội dung</th>
                        <th>Ngày nhận</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="order-table-body">
                    <tr class="empty-row"><td colspan="6">📭 Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal xem chi tiết đơn -->
<div id="detailModal" class="modal-overlay">
    <div class="modal-card">
        <h3><i class="fas fa-file-alt"></i> CHI TIẾT ĐƠN</h3>
        <div id="detail-content"></div>
        <div class="modal-actions">
            <button class="btn-cancel" id="closeDetailBtn">Đóng</button>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDTOD66P7I9d9Nc-SeRySoCskl5EEquR-w",
        authDomain: "chamcong-9385e.firebaseapp.com",
        databaseURL: "https://chamcong-9385e-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "chamcong-9385e",
        storageBucket: "chamcong-9385e.firebasestorage.app",
        messagingSenderId: "416187735141",
        appId: "1:416187735141:web:e0a6010118ae5ce5b47a8c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    let allOrders = [];
    let loaiDonList = [];

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.style.backgroundColor = isError ? '#dc2626' : '#2c7da0';
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2500);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Lấy danh sách loại đơn của user
    async function loadLoaiDon() {
        if (!currentUser) return;
        const loaiDonRef = ref(db, `loaidon/${currentUser.uid}`);
        const snapshot = await get(loaiDonRef);
        if (snapshot.exists()) {
            loaiDonList = snapshot.val();
        } else {
            loaiDonList = ["Khiếu nại", "Tố cáo", "Kiến nghị", "Phản ảnh", "Tranh chấp"];
        }
        
        // Cập nhật dropdown filter
        const filterSelect = document.getElementById('filter-loai');
        filterSelect.innerHTML = '<option value="">Tất cả loại đơn</option>';
        loaiDonList.forEach(loai => {
            const option = document.createElement('option');
            option.value = loai;
            option.textContent = loai;
            filterSelect.appendChild(option);
        });
    }

    // Lấy danh sách đơn từ Firebase
    function loadOrders() {
        if (!currentUser) return;
        
        const ordersRef = ref(db, `tiepnhandon/${currentUser.uid}`);
        onValue(ordersRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                allOrders = Object.entries(data).map(([id, value]) => ({
                    id: id,
                    ...value
                })).sort((a, b) => {
                    // Sắp xếp theo id giảm dần (mới nhất lên đầu)
                    return parseInt(b.id) - parseInt(a.id);
                });
            } else {
                allOrders = [];
            }
            renderOrders();
        });
    }

    // Render bảng với filter và search
    function renderOrders() {
        const filterLoai = document.getElementById('filter-loai').value;
        const searchText = document.getElementById('search-input').value.toLowerCase().trim();
        
        let filteredOrders = [...allOrders];
        
        if (filterLoai) {
            filteredOrders = filteredOrders.filter(order => order.phanLoai === filterLoai);
        }
        
        if (searchText) {
            filteredOrders = filteredOrders.filter(order => 
                (order.hoTen && order.hoTen.toLowerCase().includes(searchText)) ||
                (order.noiDung && order.noiDung.toLowerCase().includes(searchText)) ||
                (order.id && order.id.includes(searchText))
            );
        }
        
        const tbody = document.getElementById('order-table-body');
        
        if (filteredOrders.length === 0) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="6">📭 Không có đơn nào.</td></tr>';
            return;
        }
        
        let html = '';
        filteredOrders.forEach(order => {
            const noiDungNgan = order.noiDung ? (order.noiDung.length > 50 ? order.noiDung.substring(0, 50) + '…' : order.noiDung) : '—';
            html += `
                <tr>
                    <td><strong>#${order.id}</strong></td>
                    <td>${escapeHtml(order.hoTen || '—')}</td>
                    <td><span class="badge-status">${escapeHtml(order.phanLoai || '—')}</span></td>
                    <td>${escapeHtml(noiDungNgan)}</td>
                    <td>${order.ngayNhanDon || order.createdAt ? new Date(order.createdAt).toLocaleDateString('vi-VN') : '—'}</td>
                    <td class="action-icons">
                        <button class="btn-view" data-id="${order.id}" title="Xem chi tiết"><i class="fas fa-eye"></i></button>
                        <button class="btn-delete-order" data-id="${order.id}" title="Xóa đơn"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `;
        });
        tbody.innerHTML = html;
        
        // Gắn sự kiện cho nút xem chi tiết
        document.querySelectorAll('.btn-view').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-id');
                const order = allOrders.find(o => o.id === id);
                if (order) showDetail(order);
            });
        });
        
        // Gắn sự kiện cho nút xóa
        document.querySelectorAll('.btn-delete-order').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                if (confirm(`Bạn có chắc muốn xóa đơn #${id}?`)) {
                    try {
                        await remove(ref(db, `tiepnhandon/${currentUser.uid}/${id}`));
                        showToast(`✅ Đã xóa đơn #${id}`, false);
                    } catch (error) {
                        showToast(`❌ Lỗi: ${error.message}`, true);
                    }
                }
            });
        });
    }

    // Hiển thị chi tiết đơn
    function showDetail(order) {
        const detailDiv = document.getElementById('detail-content');
        detailDiv.innerHTML = `
            <div class="detail-row"><span class="detail-label">Mã đơn:</span> <span class="detail-value">#${order.id}</span></div>
            <div class="detail-row"><span class="detail-label">Ngày nhận:</span> <span class="detail-value">${order.ngayNhanDon || '—'}</span></div>
            <div class="detail-row"><span class="detail-label">Năm nhận:</span> <span class="detail-value">${order.namNhanDon || '—'}</span></div>
            <div class="detail-row"><span class="detail-label">Họ tên:</span> <span class="detail-value">${escapeHtml(order.hoTen || '—')}</span></div>
            <div class="detail-row"><span class="detail-label">Số CCCD:</span> <span class="detail-value">${order.cccd || '—'}</span></div>
            <div class="detail-row"><span class="detail-label">Địa chỉ:</span> <span class="detail-value">${escapeHtml(order.diaChi || '—')}</span></div>
            <div class="detail-row"><span class="detail-label">Người nhận:</span> <span class="detail-value">${order.nguoiNhan || '—'} - ${order.chucVu || ''}</span></div>
            <div class="detail-row"><span class="detail-label">Phân loại:</span> <span class="detail-value"><span class="badge-status">${escapeHtml(order.phanLoai || '—')}</span></span></div>
            <div class="detail-row"><span class="detail-label">Nội dung:</span> <span class="detail-value">${escapeHtml(order.noiDung || '—')}</span></div>
            <div class="detail-row"><span class="detail-label">Hồ sơ:</span> <span class="detail-value">${escapeHtml(order.hoSo || '—')}</span></div>
            <div class="detail-row"><span class="detail-label">Cơ quan giải quyết:</span> <span class="detail-value">${order.coQuan || '—'}</span></div>
            <div class="detail-row"><span class="detail-label">Ngày trả kết quả:</span> <span class="detail-value">${order.ngayTra || '—'}</span></div>
            <div class="detail-row"><span class="detail-label">Trả lời:</span> <span class="detail-value">${order.traLoi || '—'} ${order.traLoiText ? ': ' + order.traLoiText : ''}</span></div>
            <div class="detail-row"><span class="detail-label">Thụ lý:</span> <span class="detail-value">${order.thuLy ? '✅ Có' : '❌ Không'} ${order.thuLyText ? ': ' + order.thuLyText : ''}</span></div>
            <div class="detail-row"><span class="detail-label">Trả đơn:</span> <span class="detail-value">${order.traDon ? '✅ Có' : '❌ Không'} ${order.traDonText ? ': ' + order.traDonText : ''}</span></div>
            <div class="detail-row"><span class="detail-label">Chuyển đơn:</span> <span class="detail-value">${order.chuyenDon ? '✅ Có' : '❌ Không'} ${order.chuyenDonText ? ': ' + order.chuyenDonText : ''}</span></div>
            <div class="detail-row"><span class="detail-label">Theo dõi:</span> <span class="detail-value">${escapeHtml(order.theoDoi || '—')}</span></div>
            <div class="detail-row"><span class="detail-label">Ghi chú:</span> <span class="detail-value">${escapeHtml(order.ghiChu || '—')}</span></div>
        `;
        document.getElementById('detailModal').classList.add('active');
    }

    // Xử lý đăng xuất
    async function handleLogout() {
        try {
            await signOut(auth);
            window.location.href = "index.html";
        } catch (err) {
            showToast("Lỗi đăng xuất: " + err.message, true);
        }
    }

    // Cập nhật đồng hồ
    function updateClockAndDate() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        document.getElementById('live-clock').innerText = `${hours}:${minutes}`;
        const fullDate = now.toLocaleDateString('vi-VN', { year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('full-date-text').innerHTML = now.toLocaleDateString('vi-VN', { weekday: 'long' }) + ', ' + fullDate;
        document.getElementById('current-location-date').innerHTML = `Ninh Kiều, ${fullDate}`;
    }

    // Khởi tạo
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            document.querySelector('#user-email-display span').innerText = user.email;
            await loadLoaiDon();
            loadOrders();
        } else {
            window.location.href = "index.html";
        }
    });

    updateClockAndDate();
    setInterval(updateClockAndDate, 60000);

    // Sự kiện
    document.getElementById('logout-btn-nav').addEventListener('click', handleLogout);
    document.getElementById('refresh-btn').addEventListener('click', () => {
        loadOrders();
        showToast('🔄 Đã làm mới danh sách', false);
    });
    document.getElementById('filter-loai').addEventListener('change', () => renderOrders());
    document.getElementById('search-input').addEventListener('input', () => renderOrders());
    document.getElementById('closeDetailBtn').addEventListener('click', () => {
        document.getElementById('detailModal').classList.remove('active');
    });
    
    // Click outside modal
    window.addEventListener('click', (e) => {
        const modal = document.getElementById('detailModal');
        if (e.target === modal) {
            modal.classList.remove('active');
        }
    });
</script>
</body>
</html>
