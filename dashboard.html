<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Quản lý tiếp nhận đơn | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #eef2f9;
            min-height: 100vh;
            padding: 16px;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        /* Header nhỏ gọn */
        .header-bar {
            background: linear-gradient(135deg, #1e2b3c 0%, #0f212f 100%);
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }

        .title-section h1 {
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .title-section h1 i {
            background: #ff9800;
            padding: 5px;
            border-radius: 50%;
            font-size: 0.9rem;
            color: #1e2b3c;
        }

        .date-location {
            color: #cbd5e1;
            font-size: 0.7rem;
            margin-top: 4px;
        }

        .right-header {
            text-align: right;
        }

        .datetime-large {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            font-family: monospace;
        }

        .date-text {
            color: #a0c4e2;
            font-size: 0.7rem;
        }

        .user-info-tag {
            background: #2d4a6e40;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.65rem;
            color: #e2e8f0;
            display: inline-block;
            margin-top: 4px;
        }

        /* Button nhóm - nhỏ gọn */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 20px;
            background: #ffffff;
            border-bottom: 1px solid #e9edf2;
        }

        .btn-action {
            background: #f0f4fa;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
            color: #1f2a44;
        }

        .btn-action i {
            font-size: 0.8rem;
        }

        .btn-action:nth-child(1) { background: #2c7da0; color: white; }
        .btn-action:nth-child(2) { background: #dc2626; color: white; }
        .btn-action:nth-child(3) { background: #f59e0b; color: white; }
        .btn-action:nth-child(4) { background: #10b981; color: white; }
        
        .btn-action:hover { transform: translateY(-1px); opacity: 0.9; }

        /* Filter bar nhỏ gọn */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .filter-group label {
            font-size: 0.6rem;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
        }

        .filter-group select, .filter-group input {
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            font-family: inherit;
            font-size: 0.7rem;
            background: white;
            min-width: 100px;
        }

        .btn-filter, .btn-export {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-export { background: #10b981; }
        .btn-filter:hover { background: #1f6390; }
        .btn-export:hover { background: #059669; }

        /* Thống kê nhỏ */
        .stats-summary {
            display: flex;
            gap: 10px;
            padding: 8px 20px;
            flex-wrap: wrap;
            background: #ffffff;
        }

        .stat-card {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 6px 14px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 1.1rem;
            font-weight: 700;
            color: #2c7da0;
        }

        .stat-card .label {
            font-size: 0.6rem;
            color: #64748b;
        }

        .orders-section {
            padding: 12px 20px 20px 20px;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #0f172a;
            border-left: 3px solid #ff9800;
            padding-left: 10px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #eef2f6;
            background: #fff;
        }

        .order-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
        }

        .order-table th {
            background: #f8fafc;
            padding: 8px 8px;
            text-align: left;
            font-weight: 600;
            color: #1e293b;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.7rem;
        }

        .order-table td {
            padding: 8px 8px;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }

        .order-table tr:hover {
            background: #fefce8;
        }

        .badge-status {
            background: #e6f7e6;
            color: #2e7d32;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 600;
            display: inline-block;
        }

        .empty-row td {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
            font-size: 0.75rem;
        }

        .action-icons button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 16px;
            transition: 0.2s;
        }

        .btn-view { background: #e0f2fe; color: #0369a1; }
        .btn-delete-order { background: #fee2e2; color: #dc2626; }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-card {
            background: white;
            max-width: 550px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 24px;
            padding: 20px;
        }

        .modal-card h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #0f172a;
        }

        .detail-row {
            margin-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 8px;
            font-size: 0.75rem;
        }

        .detail-label {
            font-weight: 700;
            color: #475569;
            min-width: 120px;
            display: inline-block;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .modal-actions button {
            flex: 1;
            padding: 8px;
            border-radius: 30px;
            border: none;
            font-weight: 500;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .btn-cancel { background: #e2e8f0; color: #1e293b; }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.7rem;
            z-index: 1100;
            display: none;
        }

        @media (max-width: 680px) {
            body { padding: 8px; }
            .filter-group select, .filter-group input { min-width: 80px; }
            .btn-action { padding: 4px 10px; font-size: 0.7rem; }
            .order-table th, .order-table td { padding: 6px 5px; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header-bar">
        <div class="title-section">
            <h1><i class="fas fa-clipboard-list"></i> QUẢN LÝ TIẾP NHẬN ĐƠN</h1>
            <div class="date-location">
                <i class="fas fa-map-marker-alt"></i> Ninh Kiều, <span id="current-location-date"></span>
            </div>
            <div class="user-info-tag" id="user-email-display">
                <i class="fas fa-user-circle"></i> <span>Đang tải...</span>
            </div>
        </div>
        <div class="right-header">
            <div class="datetime-large" id="live-clock">--:--</div>
            <div class="date-text" id="full-date-text"></div>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn-action" onclick="window.location.href='tiepnhandon.html'"><i class="fas fa-plus-circle"></i> TIẾP NHẬN</button>
        <button class="btn-action" id="logout-btn-nav"><i class="fas fa-sign-out-alt"></i> THOÁT</button>
        <button class="btn-action" id="refresh-btn"><i class="fas fa-sync-alt"></i> LÀM MỚI</button>
        <button class="btn-action" id="export-all-btn"><i class="fas fa-file-excel"></i> XUẤT ALL</button>
    </div>

    <div class="filter-bar">
        <div class="filter-group">
            <label>Tháng</label>
            <select id="filter-month">
                <option value="">Tất cả</option>
                <option value="1">T1</option><option value="2">T2</option><option value="3">T3</option>
                <option value="4">T4</option><option value="5">T5</option><option value="6">T6</option>
                <option value="7">T7</option><option value="8">T8</option><option value="9">T9</option>
                <option value="10">T10</option><option value="11">T11</option><option value="12">T12</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Năm</label>
            <select id="filter-year"><option value="">Tất cả</option></select>
        </div>
        <div class="filter-group">
            <label>Loại đơn</label>
            <select id="filter-loai"><option value="">Tất cả</option></select>
        </div>
        <div class="filter-group">
            <label>Tìm kiếm</label>
            <input type="text" id="search-input" placeholder="Tên hoặc nội dung...">
        </div>
        <button class="btn-filter" id="apply-filter"><i class="fas fa-filter"></i> LỌC</button>
        <button class="btn-export" id="export-filter-btn"><i class="fas fa-download"></i> XUẤT LỌC</button>
    </div>

    <div class="stats-summary" id="stats-summary"></div>

    <div class="orders-section">
        <div class="section-title"><i class="fas fa-receipt"></i> Danh sách đơn đã tiếp nhận</div>
        <div class="table-wrapper">
            <table class="order-table">
                <thead>
                    <tr>
                        <th>Mã</th><th>Người khiếu nại</th><th>Phân loại</th>
                        <th>Nội dung</th><th>Ngày nhận</th><th>Trạng thái</th><th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="order-table-body">
                    <tr class="empty-row"><td colspan="7">📭 Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="detailModal" class="modal-overlay">
    <div class="modal-card">
        <h3><i class="fas fa-file-alt"></i> CHI TIẾT ĐƠN</h3>
        <div id="detail-content"></div>
        <div class="modal-actions">
            <button class="btn-cancel" id="closeDetailBtn">Đóng</button>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDTOD66P7I9d9Nc-SeRySoCskl5EEquR-w",
        authDomain: "chamcong-9385e.firebaseapp.com",
        databaseURL: "https://chamcong-9385e-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "chamcong-9385e",
        storageBucket: "chamcong-9385e.firebasestorage.app",
        messagingSenderId: "416187735141",
        appId: "1:416187735141:web:e0a6010118ae5ce5b47a8c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    let allOrders = [];
    let loaiDonList = [];

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.style.backgroundColor = isError ? '#dc2626' : '#2c7da0';
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function loadLoaiDon() {
        if (!currentUser) return;
        const snapshot = await get(ref(db, `loaidon/${currentUser.uid}`));
        loaiDonList = snapshot.exists() ? snapshot.val() : ["Khiếu nại", "Tố cáo", "Kiến nghị", "Phản ảnh", "Tranh chấp"];
        
        const filterSelect = document.getElementById('filter-loai');
        filterSelect.innerHTML = '<option value="">Tất cả</option>';
        loaiDonList.forEach(loai => {
            const option = document.createElement('option');
            option.value = loai;
            option.textContent = loai;
            filterSelect.appendChild(option);
        });
    }

    function loadOrders() {
        if (!currentUser) return;
        onValue(ref(db, `tiepnhandon/${currentUser.uid}`), (snapshot) => {
            const data = snapshot.val();
            allOrders = data ? Object.entries(data).map(([id, value]) => ({ id, ...value })).sort((a, b) => parseInt(b.id) - parseInt(a.id)) : [];
            applyFilterAndRender();
        });
    }

    function getMonthFromDate(dateStr) {
        if (!dateStr) return null;
        if (dateStr.includes('/')) return parseInt(dateStr.split('/')[1]);
        if (dateStr.includes('-')) return parseInt(dateStr.split('-')[1]);
        return null;
    }

    function getYearFromDate(dateStr) {
        if (!dateStr) return null;
        if (dateStr.includes('/')) return parseInt(dateStr.split('/')[2]);
        if (dateStr.includes('-')) return parseInt(dateStr.split('-')[0]);
        return null;
    }

    function applyFilterAndRender() {
        const month = document.getElementById('filter-month').value;
        const year = document.getElementById('filter-year').value;
        const loai = document.getElementById('filter-loai').value;
        const searchText = document.getElementById('search-input').value.toLowerCase().trim();

        let filtered = [...allOrders];
        if (month) filtered = filtered.filter(o => getMonthFromDate(o.ngayNhanDon) === parseInt(month));
        if (year) filtered = filtered.filter(o => getYearFromDate(o.ngayNhanDon) === parseInt(year));
        if (loai) filtered = filtered.filter(o => o.phanLoai === loai);
        if (searchText) filtered = filtered.filter(o => 
            (o.hoTen && o.hoTen.toLowerCase().includes(searchText)) ||
            (o.noiDung && o.noiDung.toLowerCase().includes(searchText))
        );
        renderOrders(filtered);
        updateStats(filtered);
    }

    function updateStats(orders) {
        const statsDiv = document.getElementById('stats-summary');
        const byLoai = {};
        orders.forEach(o => { const l = o.phanLoai || 'Khác'; byLoai[l] = (byLoai[l] || 0) + 1; });
        
        let html = `<div class="stat-card"><div class="number">${orders.length}</div><div class="label">Tổng</div></div>`;
        Object.entries(byLoai).slice(0, 4).forEach(([l, c]) => {
            html += `<div class="stat-card"><div class="number">${c}</div><div class="label">${l.length > 12 ? l.slice(0,10)+'…' : l}</div></div>`;
        });
        statsDiv.innerHTML = html;
    }

    function renderOrders(orders) {
        const tbody = document.getElementById('order-table-body');
        if (orders.length === 0) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="7">📭 Không có đơn nào</td></tr>';
            return;
        }
        
        let html = '';
        orders.forEach(order => {
            let trangThai = 'Đang xử lý';
            if (order.thuLy) trangThai = 'Đã thụ lý';
            if (order.traDon) trangThai = 'Trả đơn';
            if (order.chuyenDon) trangThai = 'Chuyển đơn';
            
            html += `<tr>
                <td><strong>#${order.id}</strong></td>
                <td>${escapeHtml(order.hoTen || '—')}</td>
                <td><span class="badge-status">${escapeHtml(order.phanLoai || '—')}</span></td>
                <td>${escapeHtml((order.noiDung || '').substring(0, 40))}${(order.noiDung || '').length > 40 ? '…' : ''}</td>
                <td>${order.ngayNhanDon || '—'}</td>
                <td>${trangThai}</td>
                <td class="action-icons">
                    <button class="btn-view" data-id="${order.id}"><i class="fas fa-eye"></i></button>
                    <button class="btn-delete-order" data-id="${order.id}"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        });
        tbody.innerHTML = html;
        
        document.querySelectorAll('.btn-view').forEach(btn => {
            btn.addEventListener('click', () => {
                const order = allOrders.find(o => o.id === btn.getAttribute('data-id'));
                if (order) showDetail(order);
            });
        });
        
        document.querySelectorAll('.btn-delete-order').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                if (confirm(`Xóa đơn #${id}?`)) {
                    await remove(ref(db, `tiepnhandon/${currentUser.uid}/${id}`));
                    showToast(`Đã xóa #${id}`);
                }
            });
        });
    }

    function exportToExcel(orders, filename) {
        const data = orders.map(o => ({
            'Mã đơn': o.id, 'Ngày nhận': o.ngayNhanDon || '', 'Năm nhận': o.namNhanDon || '',
            'Họ tên': o.hoTen || '', 'CCCD': o.cccd || '', 'Địa chỉ': o.diaChi || '',
            'Phân loại': o.phanLoai || '', 'Nội dung': o.noiDung || '',
            'Cơ quan': o.coQuan || '', 'Ngày trả': o.ngayTra || '',
            'Thụ lý': o.thuLy ? 'Có' : 'Không', 'Trả đơn': o.traDon ? 'Có' : 'Không', 'Chuyển đơn': o.chuyenDon ? 'Có' : 'Không'
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Danh sách đơn');
        XLSX.writeFile(wb, filename);
        showToast(`Xuất ${orders.length} đơn`);
    }

    function showDetail(order) {
        const detailDiv = document.getElementById('detail-content');
        detailDiv.innerHTML = `
            <div class="detail-row"><span class="detail-label">Mã đơn:</span> #${order.id}</div>
            <div class="detail-row"><span class="detail-label">Ngày nhận:</span> ${order.ngayNhanDon || '—'}</div>
            <div class="detail-row"><span class="detail-label">Họ tên:</span> ${escapeHtml(order.hoTen || '—')}</div>
            <div class="detail-row"><span class="detail-label">CCCD:</span> ${order.cccd || '—'}</div>
            <div class="detail-row"><span class="detail-label">Địa chỉ:</span> ${escapeHtml(order.diaChi || '—')}</div>
            <div class="detail-row"><span class="detail-label">Phân loại:</span> ${escapeHtml(order.phanLoai || '—')}</div>
            <div class="detail-row"><span class="detail-label">Nội dung:</span> ${escapeHtml(order.noiDung || '—')}</div>
            <div class="detail-row"><span class="detail-label">Cơ quan:</span> ${order.coQuan || '—'}</div>
            <div class="detail-row"><span class="detail-label">Trả lời:</span> ${order.traLoi || '—'} ${order.traLoiText ? ': ' + order.traLoiText : ''}</div>
            <div class="detail-row"><span class="detail-label">Thụ lý:</span> ${order.thuLy ? 'Có' : 'Không'} ${order.thuLyText ? ': ' + order.thuLyText : ''}</div>
            <div class="detail-row"><span class="detail-label">Trả đơn:</span> ${order.traDon ? 'Có' : 'Không'} ${order.traDonText ? ': ' + order.traDonText : ''}</div>
            <div class="detail-row"><span class="detail-label">Chuyển đơn:</span> ${order.chuyenDon ? 'Có' : 'Không'} ${order.chuyenDonText ? ': ' + order.chuyenDonText : ''}</div>
            <div class="detail-row"><span class="detail-label">Ghi chú:</span> ${escapeHtml(order.ghiChu || '—')}</div>
        `;
        document.getElementById('detailModal').classList.add('active');
    }

    async function handleLogout() {
        await signOut(auth);
        window.location.href = "index.html";
    }

    function populateYears() {
        const yearSelect = document.getElementById('filter-year');
        const currentYear = new Date().getFullYear();
        for (let y = 2020; y <= currentYear + 1; y++) {
            const option = document.createElement('option');
            option.value = y;
            option.textContent = y;
            yearSelect.appendChild(option);
        }
    }

    function updateClockAndDate() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
        const fullDate = now.toLocaleDateString('vi-VN', { year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('full-date-text').innerHTML = now.toLocaleDateString('vi-VN', { weekday: 'short' }) + ', ' + fullDate;
        document.getElementById('current-location-date').innerHTML = fullDate;
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            document.querySelector('#user-email-display span').innerText = user.email;
            populateYears();
            await loadLoaiDon();
            loadOrders();
        } else {
            window.location.href = "index.html";
        }
    });

    updateClockAndDate();
    setInterval(updateClockAndDate, 60000);

    document.getElementById('logout-btn-nav').addEventListener('click', handleLogout);
    document.getElementById('refresh-btn').addEventListener('click', () => { loadOrders(); showToast('Đã làm mới'); });
    document.getElementById('apply-filter').addEventListener('click', applyFilterAndRender);
    document.getElementById('export-all-btn').addEventListener('click', () => {
        if (allOrders.length) exportToExcel(allOrders, `tat_ca_don_${new Date().toISOString().slice(0,10)}.xlsx`);
        else showToast('Không có dữ liệu', true);
    });
    document.getElementById('export-filter-btn').addEventListener('click', () => {
        const month = document.getElementById('filter-month').value;
        const year = document.getElementById('filter-year').value;
        const loai = document.getElementById('filter-loai').value;
        let filtered = [...allOrders];
        if (month) filtered = filtered.filter(o => getMonthFromDate(o.ngayNhanDon) === parseInt(month));
        if (year) filtered = filtered.filter(o => getYearFromDate(o.ngayNhanDon) === parseInt(year));
        if (loai) filtered = filtered.filter(o => o.phanLoai === loai);
        if (filtered.length) exportToExcel(filtered, `ket_qua_loc_${new Date().toISOString().slice(0,10)}.xlsx`);
        else showToast('Không có dữ liệu để xuất', true);
    });
    document.getElementById('closeDetailBtn').addEventListener('click', () => {
        document.getElementById('detailModal').classList.remove('active');
    });
    document.getElementById('search-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') applyFilterAndRender(); });
    window.addEventListener('click', (e) => { if (e.target === document.getElementById('detailModal')) document.getElementById('detailModal').classList.remove('active'); });
</script>
</body>
</html>
