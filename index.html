<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Đăng nhập Firebase</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(145deg,#e9f0fc 0%,#d9e4f5 100%);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.app-card{
    width:100%;
    max-width:500px;
    background:white;
    border-radius:35px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.15);
}

.header{
    background:#1e293b;
    padding:30px;
    text-align:center;
}

.header h1{
    color:white;
    font-size:1.8rem;
}

.form-container{
    padding:30px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
    font-weight:600;
    color:#334155;
}

.input-group input{
    width:100%;
    padding:14px 16px;
    border-radius:18px;
    border:1px solid #cbd5e1;
    background:#f8fafc;
    font-size:15px;
}

.input-group input:focus{
    outline:none;
    border-color:#2563eb;
    background:white;
}

button{
    width:100%;
    border:none;
    border-radius:18px;
    padding:14px;
    cursor:pointer;
    font-weight:600;
    font-size:15px;
    transition:0.2s;
}

button:hover{
    transform:scale(0.98);
}

.primary-btn{
    background:#2563eb;
    color:white;
}

.secondary-btn{
    background:#f1f5f9;
    color:#0f172a;
    margin-top:12px;
}

.message{
    margin-top:15px;
    padding:12px;
    border-radius:15px;
    text-align:center;
    font-size:14px;
    display:none;
}

.dashboard-info{
    background:#f8fafc;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}

.info-row{
    margin-bottom:10px;
    word-break:break-word;
}

.user-profile-card{
    background:#eef2ff;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}

.password-wrap{
    position:relative;
}

.password-wrap input{
    padding-right:50px;
}

.toggle-password{
    position:absolute;
    top:50%;
    right:10px;
    transform:translateY(-50%);
    width:35px;
    height:35px;
    border:none;
    background:transparent;
    cursor:pointer;
    font-size:16px;
    padding:0;
}

.password-strength{
    height:8px;
    background:#e2e8f0;
    border-radius:10px;
    margin-top:10px;
    overflow:hidden;
}

#password-strength-bar{
    height:100%;
    width:0%;
    transition:0.3s;
    border-radius:10px;
}

#password-strength-text{
    display:block;
    margin-top:6px;
    font-size:12px;
    color:#64748b;
}

.loading-btn{
    opacity:0.7;
    pointer-events:none;
}

footer{
    text-align:center;
    padding:18px;
    font-size:12px;
    color:#64748b;
    border-top:1px solid #e2e8f0;
}

.hidden{
    display:none;
}

@media(max-width:550px){

    .form-container{
        padding:22px;
    }

}

</style>
</head>

<body>

<div class="app-card">

    <div class="header">
        <h1>TIẾP CÔNG DÂN</h1>
    </div>

    <!-- LOGIN -->
    <div id="login-container" class="form-container">

        <form id="login-form">

            <div class="input-group">
                <label>📧 Email</label>
                <input type="email" id="login-email" required>
            </div>

            <div class="input-group">
                <label>🔒 Mật khẩu</label>

                <div class="password-wrap">

                    <input type="password" id="login-password" required>

                    <button type="button"
                            class="toggle-password"
                            data-target="login-password">
                        👁️
                    </button>

                </div>

            </div>

            <button type="submit" class="primary-btn">
                Đăng nhập
            </button>

            <div id="login-message" class="message"></div>

        </form>

    </div>

    <!-- DASHBOARD -->
    <div id="user-dashboard"
         class="form-container"
         style="display:none;">

        <div class="dashboard-info">

            <div class="info-row">
                <strong>📧 Email:</strong>
                <span id="dashboard-user-email"></span>
            </div>

            <div class="info-row">
                <strong>🆔 UID:</strong>
                <span id="dashboard-user-id"></span>
            </div>

        </div>

        <div id="user-info-from-db"
             class="user-profile-card">
        </div>

        <!-- ĐỔI PASSWORD -->
        <div class="user-profile-card">

            <h3 style="margin-bottom:15px;">
                🔑 Đổi mật khẩu
            </h3>

            <div class="input-group">

                <label>Mật khẩu hiện tại</label>

                <div class="password-wrap">

                    <input type="password"
                           id="current-password">

                    <button type="button"
                            class="toggle-password"
                            data-target="current-password">
                        👁️
                    </button>

                </div>

            </div>

            <div class="input-group">

                <label>Mật khẩu mới</label>

                <div class="password-wrap">

                    <input type="password"
                           id="new-password">

                    <button type="button"
                            class="toggle-password"
                            data-target="new-password">
                        👁️
                    </button>

                </div>

                <div class="password-strength">
                    <div id="password-strength-bar"></div>
                </div>

                <small id="password-strength-text">
                    Độ mạnh mật khẩu
                </small>

            </div>

            <div class="input-group">

                <label>Xác nhận mật khẩu mới</label>

                <div class="password-wrap">

                    <input type="password"
                           id="confirm-password">

                    <button type="button"
                            class="toggle-password"
                            data-target="confirm-password">
                        👁️
                    </button>

                </div>

            </div>

            <button id="change-password-btn"
                    class="primary-btn">
                🔄 Đổi mật khẩu
            </button>

        </div>

        <button id="logout-btn"
                class="secondary-btn">
            🚪 Đăng xuất
        </button>

        <div id="dashboard-message"
             class="message">
        </div>

    </div>

    <footer>
        🔐 Firebase Authentication
    </footer>

</div>

<script type="module">

import {
    initializeApp
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
    getAuth,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged,
    EmailAuthProvider,
    reauthenticateWithCredential,
    updatePassword
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import {
    getDatabase,
    ref,
    get,
    update
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

/* FIREBASE CONFIG */
const firebaseConfig = {

    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_DOMAIN",
    databaseURL: "YOUR_DB_URL",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_BUCKET",
    messagingSenderId: "YOUR_MSG_ID",
    appId: "YOUR_APP_ID"

};

/* INIT */
const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const database = getDatabase(app);

/* DOM */
const loginForm = document.getElementById('login-form');

const loginContainer = document.getElementById('login-container');

const userDashboard = document.getElementById('user-dashboard');

const loginMessage = document.getElementById('login-message');

const dashboardMessage = document.getElementById('dashboard-message');

const dashboardUserEmail = document.getElementById('dashboard-user-email');

const dashboardUserId = document.getElementById('dashboard-user-id');

const userInfoFromDb = document.getElementById('user-info-from-db');

const logoutBtn = document.getElementById('logout-btn');

const changePasswordBtn = document.getElementById('change-password-btn');

/* MESSAGE */
function showMessage(el,text,error=true){

    el.innerHTML=text;

    el.style.display='block';

    el.style.background=error
        ? '#fef2f2'
        : '#dcfce7';

    el.style.color=error
        ? '#dc2626'
        : '#16a34a';

    setTimeout(()=>{
        el.style.display='none';
    },4000);

}

/* SHOW/HIDE PASSWORD */
document.querySelectorAll('.toggle-password')
.forEach(btn=>{

    btn.addEventListener('click',()=>{

        const target=document.getElementById(
            btn.dataset.target
        );

        if(target.type==='password'){
            target.type='text';
            btn.innerHTML='🙈';
        }else{
            target.type='password';
            btn.innerHTML='👁️';
        }

    });

});

/* LOGIN */
loginForm.addEventListener('submit',async(e)=>{

    e.preventDefault();

    const email=document
        .getElementById('login-email')
        .value.trim();

    const password=document
        .getElementById('login-password')
        .value.trim();

    try{

        await signInWithEmailAndPassword(
            auth,
            email,
            password
        );

        showMessage(
            loginMessage,
            '✅ Đăng nhập thành công',
            false
        );

        loginForm.reset();

    }catch(error){

        let msg='Sai email hoặc mật khẩu';

        if(error.code==='auth/user-not-found'){
            msg='Không tìm thấy tài khoản';
        }

        if(error.code==='auth/wrong-password'){
            msg='Sai mật khẩu';
        }

        showMessage(loginMessage,msg,true);

    }

});

/* AUTH STATE */
onAuthStateChanged(auth,async(user)=>{

    if(user){

        loginContainer.style.display='none';

        userDashboard.style.display='block';

        dashboardUserEmail.innerHTML=user.email;

        dashboardUserId.innerHTML=user.uid;

        try{

            const snapshot = await get(
                ref(database,`users/${user.uid}`)
            );

            if(snapshot.exists()){

                const data=snapshot.val();

                userInfoFromDb.innerHTML=`
                    👤 <strong>${data.fullName || ''}</strong><br><br>
                    🕒 Đăng nhập gần nhất:<br>
                    ${data.lastLogin || 'N/A'}
                `;

                await update(
                    ref(database,`users/${user.uid}`),
                    {
                        lastLogin:new Date().toLocaleString()
                    }
                );

            }

        }catch(err){
            console.log(err);
        }

    }else{

        loginContainer.style.display='block';

        userDashboard.style.display='none';

    }

});

/* PASSWORD STRENGTH */
const newPasswordInput=document
    .getElementById('new-password');

newPasswordInput.addEventListener('input',()=>{

    const password=newPasswordInput.value;

    const bar=document
        .getElementById('password-strength-bar');

    const text=document
        .getElementById('password-strength-text');

    let strength=0;

    if(password.length>=6) strength++;
    if(/[A-Z]/.test(password)) strength++;
    if(/[0-9]/.test(password)) strength++;
    if(/[!@#$%^&*]/.test(password)) strength++;

    if(strength===0){
        bar.style.width='0%';
        text.innerHTML='Độ mạnh mật khẩu';
    }

    if(strength===1){
        bar.style.width='25%';
        bar.style.background='#ef4444';
        text.innerHTML='Yếu';
    }

    if(strength===2){
        bar.style.width='50%';
        bar.style.background='#f59e0b';
        text.innerHTML='Trung bình';
    }

    if(strength===3){
        bar.style.width='75%';
        bar.style.background='#3b82f6';
        text.innerHTML='Khá mạnh';
    }

    if(strength===4){
        bar.style.width='100%';
        bar.style.background='#22c55e';
        text.innerHTML='Rất mạnh';
    }

});

/* CHANGE PASSWORD */
changePasswordBtn.addEventListener('click',async()=>{

    const currentPassword=document
        .getElementById('current-password')
        .value.trim();

    const newPassword=document
        .getElementById('new-password')
        .value.trim();

    const confirmPassword=document
        .getElementById('confirm-password')
        .value.trim();

    const user=auth.currentUser;

    if(!currentPassword ||
       !newPassword ||
       !confirmPassword){

        showMessage(
            dashboardMessage,
            'Vui lòng nhập đầy đủ thông tin'
        );

        return;
    }

    if(newPassword.length<6){

        showMessage(
            dashboardMessage,
            'Mật khẩu phải tối thiểu 6 ký tự'
        );

        return;
    }

    if(newPassword!==confirmPassword){

        showMessage(
            dashboardMessage,
            'Xác nhận mật khẩu không khớp'
        );

        return;
    }

    try{

        changePasswordBtn.classList
            .add('loading-btn');

        changePasswordBtn.innerHTML=
            '⏳ Đang cập nhật...';

        const credential=
            EmailAuthProvider.credential(
                user.email,
                currentPassword
            );

        await reauthenticateWithCredential(
            user,
            credential
        );

        await updatePassword(
            user,
            newPassword
        );

        showMessage(
            dashboardMessage,
            '✅ Đổi mật khẩu thành công',
            false
        );

        document
            .getElementById('current-password')
            .value='';

        document
            .getElementById('new-password')
            .value='';

        document
            .getElementById('confirm-password')
            .value='';

    }catch(error){

        let msg='Không thể đổi mật khẩu';

        if(error.code==='auth/wrong-password'){
            msg='Mật khẩu hiện tại không đúng';
        }

        if(error.code==='auth/weak-password'){
            msg='Mật khẩu mới quá yếu';
        }

        showMessage(
            dashboardMessage,
            msg
        );

    }finally{

        changePasswordBtn.classList
            .remove('loading-btn');

        changePasswordBtn.innerHTML=
            '🔄 Đổi mật khẩu';

    }

});

/* LOGOUT */
logoutBtn.addEventListener('click',async()=>{

    await signOut(auth);

    showMessage(
        loginMessage,
        '👋 Đã đăng xuất',
        false
    );

});

</script>

</body>
</html>
