window.logout = function() {

function escapeHtml(s){if(!s)return'';return s.replace(/[&<>]/g,function(m){return m==='&'?'&amp;':m==='<'?'&lt;':m==='>'?'&gt;':m;});}
function formatTime(d){return d.toLocaleTimeString('vi-VN');}
function formatDate(d){return d.toLocaleDateString('vi-VN');}
function getTodayStr(){return new Date().toISOString().split('T')[0];}
function getBaseUrl(){return window.location.href.split('?')[0];}
function randomId(){return 'HD' + Date.now() + Math.floor(Math.random()*10000);}

// Bật Camera trực tiếp trên màn hình Admin
function startScanner() {
    if(html5QrcodeScanner) return;
    html5QrcodeScanner = new Html5Qrcode("reader");
    const config = { fps: 10, qrbox: { width: 250, height: 250 } };
    
    html5QrcodeScanner.start(
        { facingMode: "environment" }, 
        config,
        onScanSuccess,
        onScanFailure
    ).catch(err => {
        document.getElementById('scannerFeedback').innerHTML = `<span style="color:red;">⚠️ Không mở được Camera: ${err}</span>`;
    });
}

// Khi camera của ADMIN quét trúng mã QR
async function onScanSuccess(decodedText) {
    try {
        let id = "";
        if(decodedText.includes('?id=')) {
            let urlParams = new URLSearchParams(decodedText.split('?')[1]);
            id = urlParams.get('id');
        } else {
            id = decodedText.trim();
        }
        
        if(!id) return;
        
        document.getElementById('scannerFeedback').innerHTML = "⏳ Đang truy xuất dữ liệu từ mã...";
        if (html5QrcodeScanner) { await html5QrcodeScanner.pause(true); }
        
        await handleAdminCheckIn(id);
        
    } catch (e) {
        document.getElementById('scannerFeedback').innerHTML = "❌ Lỗi đọc dữ liệu mã QR.";
        if (html5QrcodeScanner) html5QrcodeScanner.resume();
    }
}

function onScanFailure(error) { }

// Admin xử lý việc nhấn xác nhận cho người dân ngay trên máy mình
async function handleAdminCheckIn(id) {
    let container = document.getElementById('quickVerifyResult');
    let feedback = document.getElementById('scannerFeedback');
    let today = getTodayStr();
    
    try {
        let snap = await get(child(ref(db), 'recipients/' + id));
        if(!snap.exists()){
            container.innerHTML = `
                <div class="verify-card" style="border: 2px solid #c62828;">
                    <h3 style="color:#c62828;">❌ MÃ KHÔNG HỢP LỆ</h3>
                    <p>Mã QR này không tồn tại trên hệ thống dữ liệu.</p>
                    <button class="btn-orange" id="btnResumeScan" style="width:100%;">Tiếp tục quét</button>
                </div>`;
            feedback.innerHTML = "";
            document.getElementById('btnResumeScan').onclick = () => resumeCamera();
            return;
        }
        
        let data = snap.val();
        let received = await get(child(ref(db), 'received/' + id + '/' + today));
        
        if(received.exists()){
            container.innerHTML = `
                <div class="verify-card" style="border: 2px solid #ff9800;">
                    <h3 style="color:#ff9800;">⚠️ ĐÃ NHẬN QUÀ RỒI</h3>
                    <p>Danh tính: <strong>${escapeHtml(data.hoTen)}</strong><br>Địa chỉ: ${escapeHtml(data.diaChi)}</p>
                    <div style="background:#fff3e0;padding:10px;border-radius:8px;margin-bottom:10px;font-size:13px;color:#e65100;">
                        Đã phát lúc: <b>${received.val().time}</b> hôm nay.
                    </div>
                    <button class="btn-orange" id="btnResumeScan" style="width:100%;">Quét người tiếp theo</button>
                </div>`;
            feedback.innerHTML = "";
            document.getElementById('btnResumeScan').onclick = () => resumeCamera();
            return;
        }
        
        container.innerHTML = `
            <div class="verify-card" style="border: 2px solid #2e7d32; background:#f9fff9;">
                <h3 style="color:#2e7d32;">📋 THÔNG TIN NGƯỜI ĐẾN</h3>
                <p style="text-align:left;background:#fff;padding:12px;border-radius:8px;border:1px solid #ddd;font-size:14px;">
                    • <b>Họ tên:</b> ${escapeHtml(data.hoTen)}<br>
                    • <b>Địa chỉ:</b> ${escapeHtml(data.diaChi)}<br>
                    • <b>Diện:</b> ${escapeHtml(data.thuocDien || '---')}<br>
                    • <b>Khu vực:</b> ${escapeHtml(data.khuVuc || '---')}
                </p>
                <button id="btnAdminConfirm" class="btn-green" style="width:100%;padding:14px;font-size:16px;margin-top:10px;">✅ Xác Nhận Đã Nhận Quà</button>
                <button id="btnCancelScan" class="btn-orange" style="width:100%;background:#777;margin-top:5px;">Hủy bỏ</button>
            </div>`;
        feedback.innerHTML = "✨ Đã quét thành công!";
        
        document.getElementById('btnCancelScan').onclick = () => resumeCamera();
        
        document.getElementById('btnAdminConfirm').onclick = async () => {
            let btn = document.getElementById('btnAdminConfirm');
            btn.innerHTML = "⏳ Đang ghi dữ liệu...";
            btn.disabled = true;
            
            let now = new Date();
            await set(ref(db, 'received/'+id+'/'+today), {
                id, hoTen: data.hoTen, diaChi: data.diaChi,
                time: formatTime(now), datetime: now.toISOString()
            });
            await update(ref(db, 'recipients/'+id), { received: true, receivedTime: formatTime(now) });
            
            container.innerHTML = `
                <div class="verify-card" style="background:#e8f5e9; border:2px solid #2e7d32;">
                    <h3 style="color:#2e7d32;">✅ ĐÃ PHÁT QUÀ CHÍNH XÁC</h3>
                    <p>Ghi nhận thành công cho ông/bà:<br><b>${escapeHtml(data.hoTen)}</b> lúc ${formatTime(now)}.</p>
                    <button id="btnResumeScan" class="btn-green" style="width:100%;">Quét người mới</button>
                </div>`;
            
            document.getElementById('btnResumeScan').onclick = () => {
                resumeCamera();
                loadData(); 
            };
        };
        
    } catch (e) {
        container.innerHTML = `<div class="verify-card">❌ Lỗi máy chủ: ${e.message}</div>`;
        resumeCamera();
    }
}

function resumeCamera() {
    document.getElementById('quickVerifyResult').innerHTML = "";
    document.getElementById('scannerFeedback').innerHTML = "📷 Đang sẵn sàng chờ quét mã tiếp theo...";
    if (html5QrcodeScanner) { html5QrcodeScanner.resume(); }
}

function generateBase64Qr(text) {
    return new Promise((resolve) => {
        let container = document.getElementById('hiddenQrEngine');
        container.innerHTML = '';
        new QRCode(container, { text: text, width: 150, height: 150, correctLevel: QRCode.CorrectLevel.H });
        setTimeout(() => {
            let img = container.querySelector('img');
            if (img) resolve(img.src.split(',')[1]);
            else {
                let canvas = container.querySelector('canvas');
                resolve(canvas.toDataURL().split(',')[1]);
            }
        }, 100);
    });
}

async function exportExcelWithQR(){
    if(allRecipients.length===0){ alert('Không có dữ liệu để xuất'); return; }
    let btn = document.getElementById('exportQrBtn');
    let oldText = btn.innerHTML;
    btn.innerHTML = '⏳ Đang vẽ QR...';
    btn.disabled = true;
    try{
        const workbook = new ExcelJS.Workbook();
        const worksheet = workbook.addWorksheet('DanhSachAnhQR');
        worksheet.addRow(['STT', 'HỌ VÀ TÊN', 'ĐỊA CHỈ', 'THUỘC DIỆN', 'KHU VỰC', 'GHI CHÚ', 'MÃ ĐIỂM DANH (QR)']);
        worksheet.columns = [
            { width: 8, style: { alignment: { vertical: 'middle', horizontal: 'center' } } },
            { width: 25, style: { alignment: { vertical: 'middle', horizontal: 'left' } } },
            { width: 35, style: { alignment: { vertical: 'middle', horizontal: 'left' } } },
            { width: 20, style: { alignment: { vertical: 'middle', horizontal: 'center' } } },
            { width: 15, style: { alignment: { vertical: 'middle', horizontal: 'center' } } },
            { width: 20, style: { alignment: { vertical: 'middle', horizontal: 'left' } } },
            { width: 22, style: { alignment: { vertical: 'middle', horizontal: 'center' } } }
        ];
        worksheet.getRow(1).height = 30;
        worksheet.getRow(1).font = { bold: true, color: { argb: 'FFFFFF' } };
        worksheet.getRow(1).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'B00000' } };
        
        for(let i = 0; i < allRecipients.length; i++){
            let r = allRecipients[i];
            let rowNumber = i + 2;
            worksheet.addRow([r.stt || i + 1, r.hoTen, r.diaChi, r.thuocDien || '', r.khuVuc || '', r.ghiChu || '', '']);
            worksheet.getRow(rowNumber).height = 110;
            let qrBase64 = await generateBase64Qr(r.qrUrl);
            let imageId = workbook.addImage({ base64: qrBase64, extension: 'png' });
            worksheet.addImage(imageId, {
                tl: { col: 6, row: rowNumber - 1, xOffset: 5, yOffset: 5 },
                ext: { width: 135, height: 135 }
            });
        }
        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `DANH_SACH_CO_ANH_QR_${getTodayStr()}.xlsx`;
        link.click();
        alert(`✅ Đã xuất thành công file Excel chứa hình ảnh QR cho ${allRecipients.length} người!`);
    }catch(e){ alert('Lỗi xuất dữ liệu: ' + e.message); } 
    finally{ btn.innerHTML = oldText; btn.disabled = false; }
}

function exportBasicExcel(){
    if(allRecipients.length===0){ alert('Chưa có dữ liệu'); return; }
    let data = allRecipients.map((r,i)=>({
        'STT': r.stt||i+1, 'HỌ TÊN': r.hoTen, 'ĐỊA CHỈ': r.diaChi,

    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'BaoCao');
    XLSX.writeFile(wb, `BAO_CAO_${formatDate(new Date())}.xlsx`);
}

    currentQR = r;
    let modal = document.getElementById('qrModal');
    document.getElementById('modalQR').innerHTML = '';
    new QRCode(document.getElementById('modalQR'), { text: r.qrUrl, width: 200, height: 200 });
    document.getElementById('modalInfo').innerHTML = `<p><strong>${escapeHtml(r.hoTen)}</strong></p><p>${escapeHtml(r.diaChi)}</p>`;
    modal.style.display = 'flex';
}

}

async function deleteToday(){
    if(confirm('Xóa toàn bộ điểm danh của ngày hôm nay?')){
        let today = getTodayStr();
        let snap = await get(child(ref(db), 'received'));
        if(snap.exists()){
            for(let uid in snap.val()){
                if(snap.val()[uid] && snap.val()[uid][today]) await remove(ref(db, 'received/'+uid+'/'+today));
            }
        }
        let recipientsSnap = await get(child(ref(db), 'recipients'));
        if(recipientsSnap.exists()){
            for(let id in recipientsSnap.val()){
                await update(ref(db, 'recipients/'+id), { received: false, receivedTime: null });
            }
        }
        alert('Đã xóa dữ liệu hôm nay');
        if(document.getElementById('total')) await loadData();
    }
}

async function importExcel(){
    let file = document.getElementById('excelFile').files[0];
    if(!file){ alert('Vui lòng chọn tệp tin Excel!'); return; }
    let reader = new FileReader();
    reader.onload = async function(e){
        let wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        let sheet = wb.Sheets[wb.SheetNames[0]];
        let json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
        
        if(!json || json.length < 2){
            alert('File Excel không có dữ liệu hoặc không đúng định dạng!');
            return;
        }
        
        let headers = json[0];
        let colIndex = { stt: -1, hoTen: -1, diaChi: -1, thuocDien: -1, khuVuc: -1, ghiChu: -1 };
        
        headers.forEach((h, idx) => {
            if(!h) return;
            let lowerH = String(h).toLowerCase().trim();
            let normalized = lowerH.replace(/[_\s\u00A0]+/g, '').replace(/[.,;:!?]/g, '');
            
            if(normalized.includes('stt') || normalized === 'stt') colIndex.stt = idx;
            else if(normalized.includes('họ') && normalized.includes('tên')) colIndex.hoTen = idx;
            else if(normalized.includes('họtên')) colIndex.hoTen = idx;
            else if(normalized.includes('địa') && normalized.includes('chỉ')) colIndex.diaChi = idx;
            else if(normalized.includes('địachỉ')) colIndex.diaChi = idx;
            else if(normalized.includes('thuộc') && normalized.includes('diện')) colIndex.thuocDien = idx;
            else if(normalized.includes('thuộcdiện')) colIndex.thuocDien = idx;
            else if(normalized.includes('khu') && normalized.includes('vực')) colIndex.khuVuc = idx;
            else if(normalized.includes('khuvực')) colIndex.khuVuc = idx;
            else if(normalized.includes('ghi') && normalized.includes('chú')) colIndex.ghiChu = idx;
            else if(normalized.includes('ghichú')) colIndex.ghiChu = idx;
        });
        
        if(colIndex.hoTen === -1 || colIndex.diaChi === -1){
            alert('File Excel thiếu cột bắt buộc: "HỌ VÀ TÊN" hoặc "ĐỊA CHỈ"!');
            return;
        }
        
        let success = 0;
        for(let i = 1; i < json.length; i++){
            let row = json[i];
            if(!row || row.length === 0) continue;
            let hoTen = colIndex.hoTen !== -1 ? (row[colIndex.hoTen] || '').toString().trim() : '';
            let diaChi = colIndex.diaChi !== -1 ? (row[colIndex.diaChi] || '').toString().trim() : '';
            if(!hoTen || !diaChi) continue;
            
            let stt = colIndex.stt !== -1 ? (row[colIndex.stt] || '').toString().trim() : '';
            let thuocDien = colIndex.thuocDien !== -1 ? (row[colIndex.thuocDien] || '').toString().trim() : '';
            let khuVuc = colIndex.khuVuc !== -1 ? (row[colIndex.khuVuc] || '').toString().trim() : '';
            let ghiChu = colIndex.ghiChu !== -1 ? (row[colIndex.ghiChu] || '').toString().trim() : '';
            
            let id = randomId();
            let qrUrl = getBaseUrl() + '?id=' + id;
            await set(ref(db, 'recipients/'+id), {
                id, stt: stt || '', hoTen, diaChi, 
                thuocDien: thuocDien || '', khuVuc: khuVuc || '', ghiChu: ghiChu || '',
                qrUrl, received: false, createdAt: new Date().toISOString()
            });
            success++;
        }
        alert(`✅ Import thành công ${success} người!`);
        await loadData();
    };
    reader.readAsArrayBuffer(file);
}

async function loadData(){
    let snap = await get(child(ref(db), 'recipients'));
    let today = getTodayStr();
    let recSnap = await get(child(ref(db), 'received'));
    let receivedToday = {};
    if(recSnap.exists()){
        for(let uid in recSnap.val()){
            if(recSnap.val()[uid] && recSnap.val()[uid][today]) receivedToday[uid] = recSnap.val()[uid][today];
        }
    }
    allRecipients = [];
    let total=0, recCount=0, areas=new Set();
    if(snap.exists()){
        for(let id in snap.val()){
            let r = snap.val()[id];
            total++;
            let isRec = receivedToday[id] ? true : false;
            if(isRec) recCount++;
            if(r.khuVuc && r.khuVuc.trim()) areas.add(r.khuVuc.trim());
            allRecipients.push({
                id, stt: r.stt || '', hoTen: r.hoTen, diaChi: r.diaChi,
                thuocDien: r.thuocDien || '', khuVuc: r.khuVuc || '', ghiChu: r.ghiChu || '',
                received: isRec, receivedTime: receivedToday[id]?.time || null, qrUrl: r.qrUrl
            });
        }
    }
    
    allRecipients.sort((a,b) => (parseInt(a.stt) || 0) - (parseInt(b.stt) || 0));
    
    let areaSelect = document.getElementById('areaFilter');
    if(areaSelect){
        let val = areaSelect.value;
        areaSelect.innerHTML = '<option value="all">Tất cả khu vực</option>';
        [...areas].sort().forEach(a=>{ areaSelect.innerHTML += `<option value="${a.replace(/"/g, '&quot;')}">${a}</option>`; });
        if(val && areaSelect.querySelector(`option[value="${val.replace(/"/g, '&quot;')}"]`)) areaSelect.value=val;
    }
    
    if(document.getElementById('total')) document.getElementById('total').innerText = total;
    if(document.getElementById('received')) document.getElementById('received').innerText = recCount;
    if(document.getElementById('notReceived')) document.getElementById('notReceived').innerText = total-recCount;
    if(document.getElementById('rate')) document.getElementById('rate').innerText = total>0?Math.round(recCount/total*100):0;
    
    filterTable();
}

function filterTable(){
    let tbody = document.getElementById('tableBody');
    if(!tbody) return;
    
    let search = document.getElementById('search') ? document.getElementById('search').value.toLowerCase() : '';
    let status = document.getElementById('statusFilter') ? document.getElementById('statusFilter').value : 'all';
    let area = document.getElementById('areaFilter') ? document.getElementById('areaFilter').value : 'all';
    
    let filtered = allRecipients.filter(r => {
        let match = (r.hoTen || '').toLowerCase().includes(search) || (r.diaChi || '').toLowerCase().includes(search);
        let matchStatus = status==='all' || (status==='received' && r.received) || (status==='not' && !r.received);
        let matchArea = area==='all' || (r.khuVuc || '') === area;
        return match && matchStatus && matchArea;
    });
    
    if(filtered.length===0){ tbody.innerHTML='<tr><td colspan="7">📭 Không tìm thấy kết quả</td></tr>'; return; }
    tbody.innerHTML = '';
    filtered.forEach((r,i)=>{
        let statusHtml = r.received ? `<span class="badge-success">✅ Đã nhận<br>${r.receivedTime || ''}</span>` : `<span class="badge-warning">⏳ Chưa nhận</span>`;
        tbody.innerHTML += `<tr>
            <td>${r.stt || (i+1)}</td>
            <td style="text-align:left; font-weight:500;">${escapeHtml(r.hoTen)}</td>
            <td style="text-align:left">${escapeHtml(r.diaChi)}</td>
            <td>${escapeHtml(r.thuocDien) || '---'}</td>
            <td>${escapeHtml(r.khuVuc) || '---'}</td>
            <td>${statusHtml}</td>
            <td><button class="view-qr" data-id="${r.id}" style="background:#2196f3;padding:4px 10px;">🔲 QR</button></td>
        </tr>`;
    });
    document.querySelectorAll('.view-qr').forEach(btn=>{ btn.onclick=()=>showQR(btn.dataset.id); });
}

        showAdminInterface();
    } else {
        document.getElementById('loginBtn').onclick = login;
        document.getElementById('adminPassword').onkeypress = e => { if(e.key==='Enter') login(); };
        document.getElementById('loginPanel').style.display = 'block';
        document.getElementById('adminPanel').style.display = 'none';
        document.querySelectorAll('.admin-content').forEach(el=>el.style.display='none');
    }
}
